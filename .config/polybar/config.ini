;Polybar config

[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

[global/wm]
margin-top = 4
margin-bottom = 4
; vim:ft=dosini

[colors]
;background = ${xrdb:color0:#222}
background = #222
background-alt = #444
;foreground = ${xrdb:color7:#222}
foreground = #dfdfdf
foreground-alt = #555
primary = #ffb52a
secondary = #e60053
alert = #bd2c40

[bar/base]
width = 100%
height = 27
fixed-center = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3
line-color = #f00

border-size = 0
border-color = #00000000

padding-left = 0
padding-right = 2

font-0 = Fira Code:style=SemiBold:size=11
font-1 = Symbols Nerd Font Mono:style=1000-em

wm-restack = i3

;override-redirect = true
module-margin = 1

cursor-click = pointer
cursor-scroll = ns-resize

[bar/main]
inherit = bar/base
monitor = ${env:MONITOR_PRIMARY:""}

modules-left = i3 polypomo
modules-center = xwindow
modules-right = temperature-gpu temperature-cpu filesystem eth battery date

[bar/right]
inherit = bar/base
monitor = ${env:MONITOR_SECONDARY:""}

modules-left = i3 temperature-gpu temperature-cpu
modules-right = date

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#0a81f5}%mountpoint%%{F-}: %percentage_used%% (%free%)
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.foreground-alt}

[module/i3]
type = internal/i3
format = <label-state>
index-sort = true
wrapping-scroll = false

; Only show workspaces on the same output as the bar
pin-workspaces = true
strip-wsnumbers = true

label-mode-padding = 1
label-mode-foreground = #000
label-mode-background = ${colors.primary}

; focused = Active workspace on focused monitor
label-focused = %icon%
label-focused-background = ${colors.background-alt}
label-focused-underline= ${colors.primary}
label-focused-padding = 1

; unfocused = Inactive workspace on any monitor
label-unfocused = %icon%
label-unfocused-padding = 1

; visible = Active workspace on unfocused monitor
label-visible = %icon%
label-visible-background = ${self.label-focused-background}
label-visible-underline = ${self.label-focused-underline}
label-visible-padding = ${self.label-focused-padding}

; urgent = Workspace with urgency hint set
label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

ws-icon-0 = 0;-
ws-icon-1 = 1;V
ws-icon-2 = 2;ŅŹź
ws-icon-3 = 3;-
ws-icon-4 = 4;-
ws-icon-5 = 5;-
ws-icon-6 = 6;’ćü
ws-icon-7 = 7;’Æē
ws-icon-8 = 8;’Æł
ws-icon-9 = 9;’Ī©
ws-icon-10 = 10;’å╝
ws-icon-default = -

[module/wlan]
type = internal/network
interface = enp24s0
interval = 3.0

format-connected = <ramp-signal> <label-connected>
format-connected-underline = #9f78e1
label-connected = %essid%

format-disconnected =
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-alt}

ramp-signal-0 = Ņłś
ramp-signal-1 = ŅłÖ
ramp-signal-2 = ŅłÜ
ramp-signal-3 = ŅłÜ
ramp-signal-4 = ŅłÜ
ramp-signal-foreground = ${colors.foreground-alt}

[module/eth]
type = internal/network
interface = enp24s0
interval = 3.0

format-connected-underline = #55aa55
format-connected-prefix = "’ø┐ "
format-connected-prefix-foreground = ${colors.foreground-alt}
label-connected = %local_ip%

format-disconnected =
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-alt}

[module/date]
type = internal/date
interval = 1

date = %d.%m.%Y
time = %H:%M:%S

format-prefix = "’ÖÅ "
format-prefix-foreground = ${colors.foreground-alt}
format-underline = #0a6cf5

label = "%time% - %date%"

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98

format-charging = <animation-charging> <label-charging>
format-charging-underline = #ffb52a

format-discharging = <animation-discharging> <label-discharging>
format-discharging-underline = ${self.format-charging-underline}

format-full-prefix = "Ņł║ "
format-full-prefix-foreground = ${colors.foreground-alt}
format-full-underline = ${self.format-charging-underline}

ramp-capacity-0 = ŅłČ
ramp-capacity-1 = ŅłĘ
ramp-capacity-2 = ŅłĖ
ramp-capacity-foreground = ${colors.foreground-alt}

animation-charging-0 = ŅłČ
animation-charging-1 = ŅłĘ
animation-charging-2 = ŅłĖ
animation-charging-foreground = ${colors.foreground-alt}
animation-charging-framerate = 750

animation-discharging-0 = ŅłĖ
animation-discharging-1 = ŅłĘ
animation-discharging-2 = ŅłČ
animation-discharging-foreground = ${colors.foreground-alt}
animation-discharging-framerate = 750

[module/temperature]
type = internal/temperature
warn-temperature = 60

format = <ramp> <label>
format-underline = #f50a4d
format-warn = <ramp> <label-warn>
format-warn-underline = ${self.format-underline}

label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.secondary}
ramp-foreground = ${colors.foreground-alt}

[module/temperature-gpu]
inherit = module/temperature
hwmon-path = ${env:TEMP_PATH_GPU:""}
ramp-0 = ’ŗŖG
ramp-1 = ’ŗēG
ramp-2 = ’ŗćG

[module/temperature-cpu]
inherit = module/temperature
hwmon-path = ${env:TEMP_PATH_CPU:""}
ramp-0 = ’ŗŖC
ramp-1 = ’ŗēC
ramp-2 = ’ŗćC

[module/polypomo]
type = custom/script
exec = ~/.config/polybar/userscripts/polypomo
tail = true

label = %output%
click-left = ~/.config/polybar/userscripts/polypomo toggle
click-right = ~/.config/polybar/userscripts/polypomo end
click-middle = ~/.config/polybar/userscripts/polypomo lock
scroll-up = ~/.config/polybar/userscripts/polypomo time +60
scroll-down = ~/.config/polybar/userscripts/polypomo time -60
