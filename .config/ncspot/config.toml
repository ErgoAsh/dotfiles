default_keybindings = false
use_nerdfont = true
gapless = true
flip_status_indicators = true

notify = true
shuffle = false
repeat = 'off'

library_tabs = ["tracks", "browse", "playlists", "podcasts"]

[theme]
background = "black"
primary = "light white"
secondary = "light black"
title = "green"
playing = "green"
playing_selected = "light green"
playing_bg = "black"
highlight = "light white"
highlight_bg = "#484848"
error = "light white"
error_bg = "red"
statusbar = "black"
statusbar_progress = "green"
statusbar_bg = "green"
cmdline = "light white"
cmdline_bg = "black"
search_match = "light red"

[track_format]
left = "%artists - %title"
center = ""
right = "%saved %duration"

[notification_format]
title = "%title"
body = "%artists | %duration"

[keybindings]
# Play / pause
"p" = "playpause"
"s" = "stop"
"Enter" = "play"

# Fast forward / rewind
"b" = "seek -1000"
"f" = "seek +1000"
"B" = "seek -10000"
"F" = "seek +10000"

# Track manipulation
"H" = "previous"
"L" = "next"
"D" = "delete"
"S" = "save"
"r" = "repeat"
"z" = "shuffle"

# Open context menu
"O" = "open current"
"o" = "open selected"
"A" = "goto artist"
"a" = "goto album"

# Queue
" " = "queue"
"Ctrl+s" = "save queue"
"J" = "shift down 1" # Move selected song up/down in the queue
"K" = "shift up 1"
"C" = "clear"

# Open the context menu for a Spotify link in the clipboard
"Ctrl+v" = "insert"

# Volume
"=" = "volup 1"
"+" = "volup 1"
"-" = "voldown 1"
"_" = "voldown 1"
"[" = "volup 5"
"]" = "voldown 5"

# Movements
"Up" = "move up 1"
"Down" = "move down 1"
"Left" = "move left 1"
"Right" = "move right 1"
"h" = "move left 1"
"j" = "move down 1"
"k" = "move up 1"
"l" = "move right 1"

"g" = "move top"
"G" = "move bottom"
"Ctrl+u" = "move up 5"
"Ctrl+d" = "move down 5"
"q" = "back"
"Backspace" = "back"

# Views
"v" = "focus queue"
"Ctrl+k" = "focus search"
"Ctrl+l" = "focus library"
"c" = "focus library"
"." = "move playing" # Go to the playing track

# Sorting
"t" = "sort added d"
"T" = "sort title a"

# Sharing
"Y" = "share selected"
"y" = "share current"

# Other
"Q" = "quit"
"Z" = "quit"
"?" = "help"
"U" = "update"
